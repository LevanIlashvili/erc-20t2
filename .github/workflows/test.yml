name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  forge-test:
    name: Forge test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show versions
        run: |
          forge --version
          solc --version || true

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vv
